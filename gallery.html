<!DOCTYPE html>
<html lang="pl">

<!-- ================================
     HEAD
     ================================ -->
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="Logo.png" type="image/x-icon">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monolit</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

    <!-- LOADER -->
    <div id="loader">
        <img src="Logo.png" alt="Monolit">
    </div>

    <!-- ================================
        NAV
        ================================ -->
    <nav class="nav-grid">
        <button type="button" class="nav-card" onclick="kontakt()">
        <span class="kontaktnav">KONTAKT</span>
        </button>
        <button class="nav-card" onclick="monolit()">
        <img src="Logo.png" alt="Logo firmy 'Monolit'" class="logonav">
        </button>
        <button type="button" class="nav-card" onclick="galeria()">
        <span class="galerianav">GALERIA</span>
        </button>
    </nav>

    <!-- ================================
        HERO
        ================================ -->
    <section class="hero-gallery">
      <div class="hero-content">
        <h1 class="hero-title">GALERIA</h1>
        <p class="hero-subtitle">Przykłady naszych projektów i wykończeń.</p>
        <button class="defaultButton hero-button" onclick="kontakt()">SKONTAKTUJ SIĘ</button>
      </div>
    </section>

    <!-- ================================
         GALLERY
         ================================ -->
    <main class="gallery-grid">
        <div class="scroll-container">
            <img src="temp.jpg" />
            <img src="temp.jpg" />
            <img src="temp.jpg" />
            <img src="temp.jpg" />
            <img src="temp.jpg" />
            <img src="temp.jpg" />
        </div>
    </main>
</body>
